<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Productivity Coach</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <header>
            <h1>Productivity Architect</h1>
            <p>I am your discipline. Why are you here?</p>
        </header>
        <div id="chat-box"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Give your excuse...">
            <button onclick="sendMessage()">Talk</button>
        </div>
    </div>
    <script type="module" src="script.js"></script>
</body>
</html>
